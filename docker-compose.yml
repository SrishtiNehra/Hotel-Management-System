services:
  mysqldb:
    image: mysql:8.0
    container_name: hotelsqldb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rps@12345
      MYSQL_DATABASE: hotel_db
      
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-u", "root", "-prps@12345", "-e", "SELECT 1;"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    depends_on:
      mysqldb:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    container_name: springboot-app
    ports:
      - "8085:8085"
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/hotel_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rps@12345
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  mysql_data:
