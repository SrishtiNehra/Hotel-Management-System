<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Check-Out</title>
</head>
<body>
	<h2>Check-Out</h2>

<input id="reservationId">

<button onclick="checkOut()">Check Out</button>

<script src="/js/script.js"></script>

<script>
function checkOut() {

    fetch(`/api/reservations/${reservationId.value}/checkout`, {
        method: "PUT",
        headers: authHeaders()
    })
    .then(res => res.json())
    .then(() => alert("Checked Out Successfully"));
}
</script>
</body>
</html>
