<h2>Add Room</h2>

<input id="roomNumber" placeholder="Room Number">
<input id="roomType" placeholder="Type (DELUXE, SINGLE)">
<input id="price" placeholder="Price">
<input id="hotelId" placeholder="Hotel ID">

<button onclick="addRoom()">Add Room</button>

<script src="/js/script.js"></script>

<script>
function addRoom() {

    fetch("/api/rooms", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({
            roomNumber: roomNumber.value,
            roomType: roomType.value,
            price: price.value,
            hotel: {
                hotelId: hotelId.value
            }
        })
    })
    .then(res => res.json())
    .then(() => alert("Room Added"));
}
</script>
