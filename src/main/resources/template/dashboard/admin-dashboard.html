<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>

<body>

<h1>Admin Dashboard</h1>

<div id="stats"></div>

<script>
fetch("/api/dashboard/admin", {
    headers: authHeaders()
})
.then(res => res.json())
.then(data => {

    document.getElementById("stats").innerHTML = `
        <p>Customers: ${data.totalCustomers}</p>
        <p>Hotels: ${data.totalHotels}</p>
        <p>Rooms: ${data.totalRooms}</p>
        <p>Reservations: ${data.totalReservations}</p>
    `;
});
</script>

<script src="/js/script.js"></script>

</body>
</html>
