<!DOCTYPE html>
<html>
<head>
    <title>Customer Dashboard</title>
</head>

<body>

<h1>My Dashboard</h1>

<div id="myData"></div>

<script>
const customerId = 1;

fetch(`/api/dashboard/customer/${customerId}`, {
    headers: authHeaders()
})
.then(res => res.json())
.then(data => {

    document.getElementById("myData").innerHTML = `
        <p>My Reservations: ${data.totalMyReservations}</p>
    `;
});
</script>

<script src="/js/script.js"></script>

</body>
</html>
