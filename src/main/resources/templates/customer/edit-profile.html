<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: #0b1d3a;
            padding: 20px;
            color: white;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 40px;
        }

        /* HEADER */
        .page-header {
            background: linear-gradient(135deg, #0b1d3a, #1f3b5c);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        /* EDIT CARD */
        .edit-card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 900px;
            margin: auto;
        }

        .form-control {
            margin-bottom: 12px;
            border-radius: 8px;
        }

        /* BUTTON */
        .btn-custom {
            background: #0b1d3a;
            color: white;
            border-radius: 8px;
            width: 100%;
            padding: 10px;
        }

        .btn-custom:hover {
            background: #1f3b5c;
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR (UNCHANGED) -->
    <div class="sidebar">
        <h5 class="mb-4">Dashboard</h5>

        <a th:href="@{/dashboard/customer}">Dashboard</a>
        <a th:href="@{/customer/profile}">My Profile</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- HEADER -->
        <div class="page-header">
            <h3>Edit Profile</h3>
            <p class="mb-0">Update your personal information</p>
        </div>

        <!-- EDIT CARD -->
        <div class="edit-card">

            <input type="text" id="username" class="form-control" placeholder="Username">
            <input type="text" id="fullName" class="form-control" placeholder="Full Name">
            <input type="email" id="email" class="form-control" placeholder="Email">
            <input type="text" id="phoneNumber" class="form-control" placeholder="Phone Number">

            <button class="btn btn-custom mt-2" onclick="updateProfile()">
                Update Profile
            </button>

        </div>

    </div>
</div>

<script src="/js/customer-edit-profile.js"></script>

</body>
</html>
