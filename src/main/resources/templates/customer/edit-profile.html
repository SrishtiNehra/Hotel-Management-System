<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>Edit Profile</h2>

    <div class="card p-4 shadow-sm">

        <input type="text" id="username" class="form-control mb-2" placeholder="Username">
        <input type="text" id="fullName" class="form-control mb-2" placeholder="Full Name">
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <input type="text" id="phoneNumber" class="form-control mb-2" placeholder="Phone Number">
        <input type="text" id="idProof" class="form-control mb-2" placeholder="ID Proof">

        <button class="btn btn-success mt-2" onclick="updateProfile()">
            Update Profile
        </button>

    </div>

</div>

<script src="/js/customer-edit-profile.js"></script>

</body>
</html>
