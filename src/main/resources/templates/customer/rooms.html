<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Available Rooms</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: #f4f7fb;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: linear-gradient(180deg, #0b1d3a, #102a43);
            padding: 20px;
            color: white;
        }

        .sidebar h3 {
            margin-bottom: 25px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 12px 0;
            padding: 10px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* MAIN CONTENT */
        .main {
            margin-left: 260px;
            padding: 30px;
        }

        /* ROOM CARD */
        .card-room {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card-room:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: #0b1d3a;
            font-weight: 700;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h3>Customer Panel</h3>

    <a th:href="@{/dashboard/customer}">Dashboard</a>
    <a th:href="@{/customer/rooms}">Available Rooms</a>
    <a th:href="@{/customer/create-reservation}">Create Reservation</a>
    <a th:href="@{/customer/bookings}">My Bookings</a>
    <a th:href="@{/customer/payment}">Payment</a>
    <a th:href="@{/}">Logout</a>

</div>

<!-- MAIN CONTENT -->
<div class="main">

    <h2>Available Rooms</h2>

    <div class="row" id="roomGrid"></div>

</div>

<script src="/js/customer-rooms.js"></script>

</body>
</html>
