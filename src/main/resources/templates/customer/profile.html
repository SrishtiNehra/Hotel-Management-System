<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">My Profile</h2>

    <div class="card p-4 shadow-sm">

        <p><b>Username:</b> <span id="username"></span></p>
        <p><b>Full Name:</b> <span id="fullName"></span></p>
        <p><b>Email:</b> <span id="email"></span></p>
        <p><b>Phone:</b> <span id="phoneNumber"></span></p>
        <p><b>ID Proof:</b> <span id="idProof"></span></p>
        <p><b>Status:</b> <span id="status"></span></p>

        <a class="btn btn-primary mt-3" th:href="@{/customer/edit-profile}">
            Edit Profile
        </a>

    </div>

</div>

<script src="/js/customer-profile.js"></script>

</body>
</html>
