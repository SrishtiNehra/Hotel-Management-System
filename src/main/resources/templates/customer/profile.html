<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR (kept same structure, improved look only) */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: #0b1d3a;
            padding: 20px;
            color: white;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 40px;
        }

        /* HEADER */
        .page-header {
            background: linear-gradient(135deg, #0b1d3a, #1f3b5c);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        /* PROFILE CARD */
        .profile-card {
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    max-width: 900px;   /* 👈 increase width */
    margin: auto;       
}

        .profile-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .profile-item:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 600;
            color: #0b1d3a;
        }

        /* BUTTON */
        .btn-custom {
            background: #0b1d3a;
            color: white;
            border-radius: 8px;
        }

        .btn-custom:hover {
            background: #1f3b5c;
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR (UNCHANGED LINKS) -->
    <div class="sidebar">
        <h5 class="mb-4">Dashboard</h5>

        <a th:href="@{/dashboard/customer}">Dashboard</a>
        <a th:href="@{/customer/profile}">My Profile</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- HEADER -->
        <div class="page-header">
            <h3>My Profile</h3>
            <p class="mb-0">View and manage your personal information</p>
        </div>

        <!-- PROFILE CARD -->
        <div class="profile-card">

            <div class="profile-item">
                <span class="label">Username:</span>
                <span id="username"></span>
            </div>

            <div class="profile-item">
                <span class="label">Full Name:</span>
                <span id="fullName"></span>
            </div>

            <div class="profile-item">
                <span class="label">Email:</span>
                <span id="email"></span>
            </div>

            <div class="profile-item">
                <span class="label">Phone:</span>
                <span id="phoneNumber"></span>
            </div>

            <div class="profile-item">
                <span class="label">Status:</span>
                <span id="status"></span>
            </div>

            <a class="btn btn-custom mt-3" th:href="@{/customer/edit-profile}">
                Edit Profile
            </a>

        </div>

    </div>
</div>

<script src="/js/customer-profile.js"></script>

</body>
</html>
