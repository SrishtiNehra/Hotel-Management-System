<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Bills</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: linear-gradient(180deg, #0b1d3a, #102a43);
            padding: 20px;
            color: white;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 12px 0;
            padding: 10px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 30px;
        }

        /* HEADER */
        .page-header {
            background: linear-gradient(135deg, #0b1d3a, #1f3b5c);
            color: white;
            padding: 18px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .page-header h2 {
            margin: 0;
            font-weight: 600;
        }

        /* BILL CARD */
        .bill-card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .bill-card:hover {
            transform: translateY(-3px);
        }

        .bill-title {
            font-size: 18px;
            font-weight: 600;
            color: #0b1d3a;
        }

        .bill-info {
            margin: 5px 0;
            color: #374151;
        }

        .amount {
            font-weight: bold;
            color: #16a34a;
        }

        .status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .PAID {
            background: #16a34a;
            color: white;
        }

        .PENDING {
            background: #f59e0b;
            color: black;
        }

        .FAILED {
            background: #dc2626;
            color: white;
        }

        .btn-custom {
            background: #0b1d3a;
            color: white;
            border-radius: 8px;
        }

        .btn-custom:hover {
            background: #1f3b5c;
        }

        .empty-text {
            text-align: center;
            padding: 20px;
            color: #6b7280;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4 class="mb-4">Customer Panel</h4>

    <a th:href="@{/dashboard/customer}">Dashboard</a>
    <a th:href="@{/customer/bookings}">My Bookings</a>
    <a th:href="@{/customer/bills}">My Bills</a>

</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="page-header">
        <h2>My Bills</h2>
        <p class="mb-0">View and download your payment invoices</p>
    </div>

    <!-- BILLS -->
    <div id="billContainer"></div>

</div>

<script>
window.onload = function () {

    const container = document.getElementById("billContainer");

    fetch("/api/billings/my", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => {
        if (!res.ok) throw new Error("Failed to load bills");
        return res.json();
    })
    .then(data => {

        container.innerHTML = "";

        if (!data || data.length === 0) {
            container.innerHTML = `<div class="empty-text">No bills found</div>`;
            return;
        }

        data.forEach(bill => {

            container.innerHTML += `
                <div class="bill-card">

                    <div class="bill-title">
                        Bill ID: ${bill.billingId}
                    </div>

                    <div class="bill-info">
                        Amount: <span class="amount">₹${bill.amount}</span>
                    </div>

                    <div class="bill-info">
                        Status: 
                        <span class="status ${bill.paymentStatus}">
                            ${bill.paymentStatus}
                        </span>
                    </div>

                    <div class="bill-info">
                        Date: ${bill.paymentDate}
                    </div>

                    <button class="btn btn-custom mt-2"
                        onclick="downloadPDF(${bill.billingId})">
                        Download PDF
                    </button>

                </div>
            `;
        });
    })
    .catch(err => {
        console.error(err);
        container.innerHTML = `<div class="empty-text">Error loading bills</div>`;
    });
};

function downloadPDF(id) {
    window.open(`/api/billings/${id}/pdf`, "_blank");
}
</script>

</body>
</html>
