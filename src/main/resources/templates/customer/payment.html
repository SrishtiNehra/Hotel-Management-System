<!DOCTYPE html>
<html>

<head>
    <title>Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: linear-gradient(180deg, #0b1d3a, #102a43);
            padding: 20px;
            color: white;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 12px 0;
            padding: 10px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 30px;
        }

        /* HEADER */
        .page-header {
            background: linear-gradient(135deg, #0b1d3a, #1f3b5c);
            color: white;
            padding: 18px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        /* PAYMENT CARD */
        .payment-card {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            max-width: 600px;
        }

        .amount-box {
            font-size: 20px;
            font-weight: 600;
            color: #0b1d3a;
            margin-bottom: 15px;
        }

        .form-control {
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .btn-pay {
            background: #0b1d3a;
            color: white;
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
        }

        .btn-pay:hover {
            background: #1f3b5c;
        }

        .hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: -8px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4 class="mb-4">Customer</h4>

    <a th:href="@{/dashboard/customer}">Dashboard</a>
    <a th:href="@{/customer/create-reservation}">Create Reservation</a>
    <a th:href="@{/customer/bookings}">My Bookings</a>
    <a th:href="@{/customer/bills}">My Bills</a>
    <a th:href="@{/customer/payment}">Payment</a>

</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="page-header">
        <h3 class="mb-0">Payment Gateway</h3>
        <small>Secure card payment</small>
    </div>

    <!-- HIDDEN -->
    <input type="hidden" id="reservationId">
    <input type="hidden" id="amount">

    <!-- PAYMENT FORM -->
    <div class="payment-card">

        <div class="amount-box" id="amountText">
            Calculating amount...
        </div>

        <input type="text" id="cardName" class="form-control" placeholder="Card Holder Name">

        <input type="text" id="cardNumber" class="form-control" placeholder="Card Number">
        <div class="hint">Enter 16-digit card number</div>

        <input type="text" id="expiry" class="form-control" placeholder="Expiry MM/YY">

        <input type="text" id="cvv" class="form-control" placeholder="CVV">

        <button class="btn btn-pay w-100 mt-2" onclick="payNow()">
            Pay Now
        </button>

    </div>

</div>

<script src="/js/payment.js"></script>

</body>
</html>
