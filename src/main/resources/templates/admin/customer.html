<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Customers</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/customers}">Manage Customers</a>
    </div>

    <div class="main">

        <h2>Customers</h2>

        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="customerTable"></tbody>
        </table>

    </div>
</div>

<script>
window.onload = function () {

    fetch("/api/customers", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => res.json())
    .then(data => {

        let rows = "";
        data.forEach(c => {
            rows += `
                <tr>
                    <td>${c.customerId}</td>
                    <td>${c.username}</td>
                    <td>${c.fullName}</td>
                    <td>${c.email}</td>
                    <td>${c.phoneNumber}</td>
                    <td>${c.status}</td>
                </tr>
            `;
        });

        document.getElementById("customerTable").innerHTML = rows;
    });
};
</script>

</body>
</html>
