<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Customers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #102a43;
            padding: 20px;
            color: white;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* MAIN CONTENT */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        /* HEADER CARD */
        .title-card {
            background: white;
            padding: 18px 20px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .title-card h3 {
            margin: 0;
            color: #0b1d3a;
            font-weight: 600;
        }

        /* TABLE CARD */
        .card-box {
            background: white;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .table thead {
            background: #0b1d3a  !important;
            color: white !important;
        }

        .table tbody tr:hover {
            background: #f1f5f9;
        }

        .badge-id {
            background: #1f3b5c;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h5 class="mb-4">Admin Panel</h5>

    <a th:href="@{/dashboard/admin}">Dashboard</a>
   
    <a th:href="@{/admin/customers}">Customers</a>
    
</div>

<!-- MAIN -->
<div class="main">

    <!-- TITLE -->
    <div class="title-card">
        <h3>Customer Management</h3>
        <small class="text-muted">View all registered customers</small>
    </div>

    <!-- TABLE -->
    <div class="card-box">

        <table class="table table-hover align-middle mb-0">

            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
            </tr>
            </thead>

            <tbody id="customersTable"></tbody>

        </table>

    </div>

</div>

<script>
fetch("/api/admins/customers")
    .then(res => res.json())
    .then(data => {
        let rows = "";

        data.forEach(c => {
            rows += `
                <tr>
                    <td><span class="badge-id">${c.customerId}</span></td>
                    <td>${c.fullName}</td>
                    <td>${c.email}</td>
                    <td>${c.phoneNumber}</td>
                </tr>
            `;
        });

        document.getElementById("customersTable").innerHTML = rows;
    })
    .catch(err => console.log("Error:", err));
</script>

</body>
</html>
