<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Admin Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="bg-dark text-white p-3 vh-100" style="width: 220px;">
        <h4 class="mb-4">Dashboard</h4>

        <a href="/dashboard/admin" class="text-white d-block mb-2">Dashboard</a>
        <a href="/admin/profile" class="text-white d-block">My Profile</a>
    </div>

    <!-- CONTENT -->
    <div class="container mt-5">

        <h2>Edit Profile</h2>

        <div class="card p-4 shadow-sm">

            <!-- NO ENTITY CHANGE USED -->
            <input type="hidden" id="adminId">

            <input type="text" id="username" class="form-control mb-2" placeholder="Username">
            <input type="text" id="fullName" class="form-control mb-2" placeholder="Full Name">
            <input type="email" id="email" class="form-control mb-2" placeholder="Email">

            <button class="btn btn-success mt-2" onclick="updateProfile()">
                Update Profile
            </button>

        </div>

    </div>
</div>

<script src="/js/admin-edit-profile.js"></script>

</body>
</html>
