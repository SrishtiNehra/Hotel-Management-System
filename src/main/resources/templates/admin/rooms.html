<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Room Management</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/admin.css}">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: linear-gradient(180deg, #0b1d3a, #102a43);
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 12px 0;
            padding: 8px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: #fff;
        }

        /* Main */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        h2 {
            color: #0b1d3a;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Form box */
        .form-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .form-control, .form-select {
            margin-bottom: 10px;
        }

        .btn-custom {
            background: #0b1d3a;
            color: white;
        }

        .btn-custom:hover {
            background: #132a52;
        }

        /* Table */
        table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        th {
            background: #0b1d3a;
            color: white;
        }

        /* Modal */
        #editRoomModal {
            display: none;
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 25px;
            border-radius: 12px;
            z-index: 999;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #editRoomModal h3 {
            color: #0b1d3a;
        }

        #editRoomModal input,
        #editRoomModal select {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }

        .modal-btn {
            background: #0b1d3a;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .modal-btn:hover {
            background: #132a52;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Admin Panel</h2>

    <a th:href="@{/dashboard/admin}">Dashboard</a>
    <a th:href="@{/admin/rooms}">Rooms</a>
    <a th:href="@{/admin/customers}">Customers</a>
</div>

<!-- MAIN -->
<div class="main">

    <h2>Room Management</h2>

    <!-- ADD ROOM -->
    <div class="form-box">

        <input type="text" id="roomNumber" class="form-control" placeholder="Room Number">

        <select id="roomType" class="form-select">
            <option value="">-- Select Room Type --</option>
            <option value="SINGLE">SINGLE</option>
            <option value="DELUXE">DELUXE</option>
            <option value="SUITE">SUITE</option>
        </select>

        <input type="number" id="price" class="form-control" placeholder="Price">

        <select id="status" class="form-select">
            <option value="">-- Select Status --</option>
            <option value="AVAILABLE">AVAILABLE</option>
        </select>

        <input type="number" id="hotelId" class="form-control" placeholder="Hotel ID">

        <button class="btn btn-custom w-100" onclick="addRoom()">Add Room</button>

    </div>

    <br>

    <!-- TABLE -->
    <table class="table table-bordered text-center">
        <thead>
        <tr>
            <th>ID</th>
            <th>Room No</th>
            <th>Type</th>
            <th>Price</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody id="roomTable"></tbody>
    </table>

</div>

<!-- ================= EDIT MODAL ================= -->
<div id="editRoomModal">

    <h3>Edit Room</h3>

    <input type="hidden" id="editRoomId">

    <input id="editRoomNumber" placeholder="Room Number">

    <select id="editRoomType">
        <option value="SINGLE">SINGLE</option>
        <option value="DELUXE">DELUXE</option>
        <option value="SUITE">SUITE</option>
        <!--  <option value="FAMILY">DOUBLE</option> -->
    </select>

    <input id="editPrice" placeholder="Price">

    <select id="editStatus">
        <option value="AVAILABLE">AVAILABLE</option>
        <!-- <option value="BOOKED">RESERVED</option> -->
    </select>

    <button class="modal-btn" onclick="updateRoom()">Update</button>
    <button class="modal-btn" onclick="closeRoomModal()">Close</button>

</div>

<script th:src="@{/js/rooms.js}" defer></script>

</body>
</html>
