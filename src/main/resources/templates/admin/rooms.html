<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Room Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR (UNCHANGED) */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: linear-gradient(180deg, #0b1d3a, #102a43);
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 12px 0;
            padding: 8px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: #fff;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        /* HEADER */
        .page-header {
            background: linear-gradient(135deg, #0b1d3a, #1f3b5c);
            color: white;
            padding: 18px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .page-header h2 {
            margin: 0;
            font-weight: 600;
        }

        /* FORM CARD */
        .form-box {
            background: white;
            padding: 22px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .form-control,
        .form-select {
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .btn-custom {
            background: #0b1d3a;
            color: white;
            border-radius: 8px;
            padding: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #1f3b5c;
        }

        /* TABLE CARD */
        .table-box {
            background: white;
            padding: 15px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #0b1d3a !important;
            color: white !important;
            text-align: center;
        }

        td {
            vertical-align: middle;
        }

        /* ACTION BUTTONS */
        .btn-edit {
            background: #2563eb;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .btn-edit:hover {
            background: #1d4ed8;
        }

        .btn-delete {
            background: #dc2626;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .btn-delete:hover {
            background: #b91c1c;
        }

        /* MODAL */
        #editRoomModal {
            display: none;
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 22px;
            border-radius: 14px;
            width: 380px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            z-index: 999;
        }

        #editRoomModal h3 {
            color: #0b1d3a;
            margin-bottom: 15px;
        }

        #editRoomModal input,
        #editRoomModal select {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .modal-btn {
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .update-btn {
            background: #16a34a;
            color: white;
        }

        .update-btn:hover {
            background: #15803d;
        }

        .close-btn {
            background: #6b7280;
            color: white;
        }

        .close-btn:hover {
            background: #4b5563;
        }
    </style>
</head>

<body>

<!-- SIDEBAR (UNCHANGED) -->
<div class="sidebar">
    <h4 class="mb-3">Admin Panel</h4>

    <a th:href="@{/dashboard/admin}">Dashboard</a>
    <a th:href="@{/admin/rooms}">Rooms</a>
    <a th:href="@{/admin/customers}">Customers</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="page-header">
        <h2>Room Management</h2>
        <small>Manage rooms, pricing, and availability</small>
    </div>

    <!-- FORM -->
    <div class="form-box">

        <input type="text" id="roomNumber" class="form-control" placeholder="Room Number">

        <select id="roomType" class="form-select">
            <option value="">-- Select Room Type --</option>
            <option value="SINGLE">SINGLE</option>
            <option value="DELUXE">DELUXE</option>
            <option value="SUITE">SUITE</option>
        </select>

        <input type="number" id="price" class="form-control" placeholder="Price">

        <select id="status" class="form-select">
            <option value="AVAILABLE">AVAILABLE</option>
        </select>

        <input type="number" id="hotelId" class="form-control" placeholder="Hotel ID">

        <button class="btn btn-custom w-100" onclick="addRoom()">
            + Add Room
        </button>

    </div>

    <!-- TABLE -->
    <div class="table-box">

        <table class="table table-hover text-center mb-0">

            <thead>
            <tr>
                <th>ID</th>
                <th>Room No</th>
                <th>Type</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody id="roomTable"></tbody>

        </table>

    </div>

</div>

<!-- EDIT MODAL -->
<div id="editRoomModal">

    <h3>Edit Room</h3>

    <input type="hidden" id="editRoomId">

    <input id="editRoomNumber" placeholder="Room Number">

    <select id="editRoomType">
        <option value="SINGLE">SINGLE</option>
        <option value="DELUXE">DELUXE</option>
        <option value="SUITE">SUITE</option>
    </select>

    <input id="editPrice" placeholder="Price">

    <select id="editStatus">
        <option value="AVAILABLE">AVAILABLE</option>
    </select>

    <button class="modal-btn update-btn" onclick="updateRoom()">Update</button>
    <button class="modal-btn close-btn" onclick="closeRoomModal()">Close</button>

</div>

<script th:src="@{/js/rooms.js}" defer></script>

</body>
</html>
