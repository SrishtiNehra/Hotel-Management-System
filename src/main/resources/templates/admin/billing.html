<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Billing</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: linear-gradient(180deg, #0b1d3a, #102a43);
            padding: 20px;
            color: white;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 12px 0;
            padding: 8px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        /* HEADER */
        .page-header {
            background: linear-gradient(135deg, #0b1d3a, #1f3b5c);
            color: white;
            padding: 18px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .page-header h3 {
            margin: 0;
            font-weight: 600;
        }

        /* TABLE CARD */
        .card-box {
            background: white;
            border-radius: 14px;
            padding: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #0b1d3a !important;
            color: white !important;
            text-align: center;
        }

        td {
            text-align: center;
            vertical-align: middle;
        }

        /* STATUS BADGES */
        .badge-status {
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .PAID {
            background: #16a34a;
            color: white;
        }

        .PENDING {
            background: #f59e0b;
            color: black;
        }

        .FAILED {
            background: #dc2626;
            color: white;
        }

        /* AMOUNT STYLE */
        .amount {
            font-weight: 600;
            color: #0b1d3a;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h5 class="mb-4">Admin Panel</h5>

    <a th:href="@{/dashboard/admin}">Dashboard</a>
    <a th:href="@{/admin/customers}">Customers</a>
    <a th:href="@{/admin/hotels}">Hotels</a>
    <a th:href="@{/admin/rooms}">Rooms</a>
    <a th:href="@{/admin/reservations}">Reservations</a>
    <a th:href="@{/admin/billing}">Billing</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="page-header">
        <h3>Billing Management</h3>
        <small>Track payments and transaction status</small>
    </div>

    <!-- TABLE -->
    <div class="card-box">

        <table class="table table-hover align-middle mb-0">

            <thead>
            <tr>
                <th>Billing ID</th>
                <th>Reservation ID</th>
                <th>Amount</th>
                <th>Payment Date</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody id="billingTable"></tbody>

        </table>

    </div>

</div>

<script>
fetch("/api/billings/admin")
    .then(res => {
        if (!res.ok) {
            throw new Error("HTTP Error: " + res.status);
        }
        return res.json();
    })
    .then(data => {

        let rows = "";

        data.forEach(b => {

            let statusClass = b.paymentStatus;

            rows += `
                <tr>
                    <td>${b.billingId}</td>
                    <td>${b.reservationId}</td>
                    <td class="amount">₹${b.amount}</td>
                    <td>${b.paymentDate}</td>
                    <td>
                        <span class="badge-status ${statusClass}">
                            ${b.paymentStatus}
                        </span>
                    </td>
                </tr>
            `;
        });

        document.getElementById("billingTable").innerHTML = rows;
    })
    .catch(err => {
        console.log("Billing fetch error:", err);
        document.getElementById("billingTable").innerHTML =
            `<tr><td colspan="5" class="text-danger text-center">Failed to load billing data</td></tr>`;
    });
</script>

</body>
</html>
