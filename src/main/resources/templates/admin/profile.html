<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: #102a43;
            padding: 20px;
            color: white;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 40px;
        }

        /* PROFILE CARD */
        .profile-card {
            background: white;
            border-radius: 16px;
            max-width: 650px;
            margin: auto;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .profile-header {
            background: linear-gradient(135deg, #0b1d3a, #1f3b5c);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .profile-header h4 {
            margin: 0;
            font-weight: 600;
        }

        .profile-body {
            padding: 25px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .info-label {
            color: #6b7280;
            font-weight: 500;
        }

        .info-value {
            font-weight: 600;
            color: #111827;
        }

        .btn-edit {
            background: #0b1d3a;
            color: white;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-edit:hover {
            background: #1f3b5c;
        }

        /* MODAL */
        #editModal {
            display: none;
            position: fixed;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .modal-header {
            background: #0b1d3a;
            color: white;
            padding: 15px;
        }

        .modal-body {
            padding: 20px;
        }

        .btn-update {
            background: #16a34a;
            color: white;
        }

        .btn-update:hover {
            background: #15803d;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h5 class="mb-4">Admin Panel</h5>
    <a th:href="@{/dashboard/admin}">Dashboard</a>
    <a th:href="@{/admin/profile}">Profile</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="profile-card">

        <!-- HEADER -->
        <div class="profile-header">
            <h4>Admin Profile</h4>
            <p class="mb-0">Manage your account details</p>
        </div>

        <!-- BODY -->
        <div class="profile-body">

            <input type="hidden" id="adminId">

            <div class="info-row">
                <span class="info-label">Username</span>
                <span class="info-value" id="usernameView"></span>
            </div>

            <div class="info-row">
                <span class="info-label">Full Name</span>
                <span class="info-value" id="fullNameView"></span>
            </div>

            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value" id="emailView"></span>
            </div>

            <button class="btn-edit" onclick="openEdit()">
                Edit Profile
            </button>

        </div>
    </div>

</div>

<!-- MODAL -->
<div id="editModal">

    <div class="modal-header">
        <h5 class="mb-0">Edit Profile</h5>
    </div>

    <div class="modal-body">

        <input class="form-control mb-3" id="fullName" placeholder="Full Name">
        <input class="form-control mb-3" id="email" placeholder="Email">

        <button class="btn btn-update w-100" onclick="updateProfile()">
            Update
        </button>

        <button class="btn btn-secondary w-100 mt-2" onclick="closeEdit()">
            Close
        </button>

    </div>
</div>

<script src="/js/admin-profile.js"></script>

</body>
</html>
