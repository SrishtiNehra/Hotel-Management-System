<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: linear-gradient(180deg, #0b1d3a, #102a43);
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar h4 {
            color: white;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 12px 0;
            padding: 10px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* MAIN CONTENT */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        /* CARD */
        .card-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 650px;
            margin: auto;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        /* MODAL */
        #editModal {
            display: none;
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px;
            width: 380px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 999;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4>Admin Panel</h4>

    <a href="/dashboard/admin">🏠 Dashboard</a>
    <a href="/admin/profile">👤 Profile</a>
    

</div>

<!-- MAIN -->
<div class="main">

    <div class="card-box">

        <h3 class="mb-4 text-primary">Admin Profile</h3>

        <input type="hidden" id="adminId">
        <input type="hidden" id="username">
        <input type="hidden" id="password">
        <input type="hidden" id="role">
        <input type="hidden" id="status">

        <p><b>Username:</b> <span id="usernameView"></span></p>
        <p><b>Full Name:</b> <span id="fullNameView"></span></p>
        <p><b>Email:</b> <span id="emailView"></span></p>

        <button class="btn btn-primary mt-3" onclick="openEdit()">
            ✏ Edit Profile
        </button>

    </div>

</div>

<!-- MODAL (UNCHANGED LOGIC) -->
<div id="editModal">

    <h4>Edit Profile</h4>

    <input class="form-control mb-2" id="fullName" placeholder="Full Name">
    <input class="form-control mb-2" id="email" placeholder="Email">

    <button class="btn btn-success w-100" onclick="updateProfile()">Update</button>
    <button class="btn btn-secondary w-100 mt-2" onclick="closeEdit()">Close</button>

</div>

<script src="/js/profile.js"></script>

</body>
</html>
