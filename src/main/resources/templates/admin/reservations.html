<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reservations</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: linear-gradient(180deg, #0b1d3a, #102a43);
            padding: 20px;
            color: white;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 12px 0;
            padding: 8px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        /* HEADER */
        .page-header {
            background: linear-gradient(135deg, #0b1d3a, #1f3b5c);
            color: white;
            padding: 18px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .page-header h3 {
            margin: 0;
            font-weight: 600;
        }

        /* TABLE CARD */
        .card-box {
            background: white;
            border-radius: 14px;
            padding: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #0b1d3a !important;
            color: white !important;
            text-align: center;
        }

        td {
            text-align: center;
            vertical-align: middle;
        }

        /* STATUS BADGES */
        .status {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .CONFIRMED {
            background: #16a34a;
            color: white;
        }

        .PENDING {
            background: #f59e0b;
            color: white;
        }

        .CANCELLED {
            background: #dc2626;
            color: white;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h5 class="mb-4">Admin Panel</h5>

    <a th:href="@{/dashboard/admin}">Dashboard</a>
    <a th:href="@{/admin/customers}">Customers</a>
    <a th:href="@{/admin/hotels}">Hotels</a>
    <a th:href="@{/admin/rooms}">Rooms</a>
    <a th:href="@{/admin/reservations}">Reservations</a>
    <a th:href="@{/admin/billing}">Billing</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="page-header">
        <h3>Reservations Management</h3>
        <small>View and track all bookings</small>
    </div>

    <!-- TABLE -->
    <div class="card-box">

        <table class="table table-hover align-middle mb-0">

            <thead>
            <tr>
                <th>ID</th>
                <th>Customer ID</th>
                <th>Room ID</th>
                <th>Check-In</th>
                <th>Check-Out</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody id="reservationTable"></tbody>

        </table>

    </div>

</div>

<script>
fetch("/api/admins/reservations")
    .then(res => res.json())
    .then(data => {
        let rows = "";

        data.forEach(r => {
            rows += `
                <tr>
                    <td>${r.reservationId}</td>
                    <td>${r.customerId}</td>
                    <td>${r.roomId}</td>
                    <td>${r.plannedCheckIn}</td>
                    <td>${r.plannedCheckOut}</td>
                    <td>
                        <span class="status ${r.status}">
                            ${r.status}
                        </span>
                    </td>
                </tr>
            `;
        });

        document.getElementById("reservationTable").innerHTML = rows;
    })
    .catch(err => console.log("Error:", err));
</script>

</body>
</html>
