<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Hotel Management</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/admin.css}">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: linear-gradient(180deg, #0b1d3a, #102a43);
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 12px 0;
            padding: 8px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* Main */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        h2 {
            color: #0b1d3a;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Form */
        .form-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .form-control {
            margin-bottom: 10px;
        }

        .btn-custom {
            background: #0b1d3a;
            color: white;
        }

        .btn-custom:hover {
            background: #132a52;
        }

        /* Table */
        table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        th {
            background: #0b1d3a;
            color: white;
        }

        /* Modal */
        #editModal {
            display: none;
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 25px;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 999;
        }

        #editModal h3 {
            color: #0b1d3a;
        }

        #editModal input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }

        .modal-btn {
            background: #0b1d3a;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            margin-right: 5px;
        }

        .modal-btn:hover {
            background: #132a52;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <a th:href="@{/dashboard/admin}">Dashboard</a>
    <a th:href="@{/admin/hotels}">Hotel Management</a>
</div>

<!-- MAIN -->
<div class="main">

    <h2>Hotel Management</h2>

    <!-- ADD HOTEL FORM -->
    <div class="form-box">

        <input id="name" class="form-control" placeholder="Hotel Name">
        <input id="address" class="form-control" placeholder="Address">
        <input id="city" class="form-control" placeholder="City">
        <input id="state" class="form-control" placeholder="State">
        <input id="zipCode" class="form-control" placeholder="Zip Code">
        <input id="contactNumber" class="form-control" placeholder="Contact">
        <input id="email" class="form-control" placeholder="Email">

        <button class="btn btn-custom w-100" onclick="addHotel()">Add Hotel</button>

    </div>

    <hr>

    <!-- TABLE -->
    <table class="table table-bordered text-center">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Address</th>
            <th>City</th>
            <th>State</th>
            <th>Zip Code</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody id="hotelTable"></tbody>
    </table>

</div>

<!-- ================= EDIT MODAL ================= -->
<div id="editModal">

    <h3>Edit Hotel</h3>

    <input type="hidden" id="editId">

    <input id="editName" placeholder="Hotel Name">
    <input id="editAddress" placeholder="Address">
    <input id="editCity" placeholder="City">
    <input id="editState" placeholder="State">
    <input id="editZip" placeholder="Zip Code">
    <input id="editContact" placeholder="Contact">
    <input id="editEmail" placeholder="Email">

    <button class="modal-btn" onclick="updateHotel()">Update</button>
    <button class="modal-btn" onclick="closeModal()">Close</button>

</div>

<!-- JS -->
<script th:src="@{/js/hotel.js}" defer></script>

</body>
</html>
