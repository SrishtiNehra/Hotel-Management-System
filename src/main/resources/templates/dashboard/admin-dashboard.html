<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f4f7fb;
        }

        /* TOPBAR */
        .topbar {
            height: 60px;
            background: #0b1d3a;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            top: 60px;
            left: 0;
            background: #0b1d3a;
            padding: 20px;
            transition: 0.3s;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            white-space: nowrap;
        }

        .sidebar a:hover {
            background:  #0b1d3a;
            color: white;
        }

        .sidebar.collapsed a span {
            display: none;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 80px 20px;
            transition: 0.3s;
        }

        .main.expanded {
            margin-left: 90px;
        }

        /* CARDS */
        .card-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            text-align: center;
        }

        /* WELCOME */
        .welcome {
            background: linear-gradient(135deg, #0b1d3a, #1f3b5c);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
    <h5 class="ms-3 mb-0">Admin Dashboard</h5>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a th:href="@{/dashboard/admin}"><span>Dashboard</span></a>
    <a th:href="@{/admin/profile}"><span>Admin Profile</span></a>
    <a th:href="@{/admin/customers}"><span>Customers</span></a>
    <a th:href="@{/admin/hotels}"><span>Hotels</span></a>
    <a th:href="@{/admin/rooms}"><span>Rooms</span></a>
    <a th:href="@{/admin/reservations}"><span>Reservations</span></a>
    <a th:href="@{/admin/billing}"><span>Billing</span></a>
    <a th:href="@{/}"><span>Logout</span></a>
</div>

<!-- MAIN -->
<div class="main" id="main">

    <div class="welcome">
        <h3>Welcome, Admin 👋</h3>
        <p class="mb-0">Manage your hotel system efficiently from one place.</p>
    </div>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card-box">
                <h5>Customers</h5>
                <h3 id="customersCount">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box">
                <h5>Rooms</h5>
                <h3 id="roomsCount">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box">
                <h5>Reservations</h5>
                <h3 id="reservationsCount">0</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box">
                <h5>Revenue</h5>
                <h3 id="billsCount">₹0</h3>
            </div>
        </div>

    </div>
</div>

<!-- SCRIPT -->
<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.getElementById("main").classList.toggle("expanded");
}
</script>

<script src="/js/dashboard.js"></script>

</body>
</html>
