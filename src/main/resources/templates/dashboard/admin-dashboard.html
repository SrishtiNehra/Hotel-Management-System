<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fb;
        }

        /* TOP BAR */
        .topbar {
            height: 60px;
            background: #0b1d3a;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            top: 60px;
            left: 0;
            background: linear-gradient(180deg, #0b1d3a, #102a43);
            padding: 20px;
            transition: 0.3s;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin: 12px 0;
            padding: 10px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .sidebar a:hover {
            background: #1f3b5c;
            color: white;
        }

        /* ONLY TEXT HIDES ON COLLAPSE */
        .sidebar.collapsed a span {
            display: none;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 80px 20px 20px;
            transition: 0.3s;
        }

        .main.expanded {
            margin-left: 90px;
        }

        /* CARDS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card h3 {
            color: #0b1d3a;
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
    <h5 class="ms-3 mb-0">Admin Dashboard</h5>
</div>

<!-- SIDEBAR (UNCHANGED LOGOUT) -->
<div class="sidebar" id="sidebar">

    <a th:href="@{/dashboard/admin}"><span>Dashboard</span></a>
    <a th:href="@{/admin/profile}"><span>Admin Profile</span></a>
    <a th:href="@{/admin/customers}"><span>Customers</span></a>
    <a th:href="@{/admin/hotels}"><span>Hotels</span></a>
    <a th:href="@{/admin/rooms}"><span>Rooms</span></a>
    <a th:href="@{/admin/reservations}"><span>Reservations</span></a>
    <a th:href="@{/admin/billing}"><span>Billing</span></a>
    <a th:href="@{/admin/reports}"><span>Reports</span></a>

    <!-- EXACT SAME LOGOUT (NO CHANGE) -->
    <a th:href="@{/}" class="logout">
        <span>Logout</span>
    </a>

</div>

<!-- MAIN -->
<div class="main" id="main">

    <div class="grid">

        <div class="card">
            <h3>Customers</h3>
            <p id="customersCount">0</p>
        </div>

        <div class="card">
            <h3>Rooms</h3>
            <p id="roomsCount">0</p>
        </div>

        <div class="card">
            <h3>Reservations</h3>
            <p id="reservationsCount">0</p>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <p id="billsCount">₹0</p>
        </div>

    </div>

</div>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.getElementById("main").classList.toggle("expanded");
}
</script>

<script src="/js/dashboard.js"></script>

</body>
</html>
