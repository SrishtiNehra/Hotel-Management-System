<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/login.css}">

    <style>
        body {
            background: linear-gradient(135deg, #0b1d3a, #1a2b4c);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: #ffffff;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .login-title {
            color: #0b1d3a;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }

        .btn-custom {
            background-color: #0b1d3a;
            color: white;
            border-radius: 8px;
        }

        .btn-custom:hover {
            background-color: #132a52;
        }

        .form-control:focus {
            border-color: #0b1d3a;
            box-shadow: 0 0 0 0.2rem rgba(11, 29, 58, 0.25);
        }

        a {
            color: #0b1d3a;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-card">

    <h2 class="login-title">Login</h2>

    <div class="mb-3">
        <input type="text" id="username" class="form-control" placeholder="Username">
         <div class="invalid-feedback"></div>
    </div>

    <div class="mb-3">
        <input type="password" id="password" class="form-control" placeholder="Password">
         <div class="invalid-feedback"></div>
    </div>

    <div class="d-grid">
        <button class="btn btn-custom" onclick="login()">Login</button>
    </div>

    <p class="text-center mt-3">
        New user? <a th:href="@{/auth/register}">Register here</a>
    </p>

</div>

<script src="/js/login.js"></script>
<script src="/js/toast.js"></script>

</body>
</html>
