<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Register</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/login.css}">

    <style>
        body {
            background: linear-gradient(135deg, #0b1d3a, #1a2b4c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .admin-card {
            background: #ffffff;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .admin-title {
            text-align: center;
            font-weight: 700;
            color: #0b1d3a;
            margin-bottom: 25px;
        }

        .btn-custom {
            background-color: #0b1d3a;
            color: white;
            border-radius: 8px;
        }

        .btn-custom:hover {
            background-color: #132a52;
        }

        .form-control:focus {
            border-color: #0b1d3a;
            box-shadow: 0 0 0 0.2rem rgba(11, 29, 58, 0.25);
        }
    </style>
</head>

<body>

<div class="admin-card">

    <h2 class="admin-title">Admin Registration</h2>

    <div class="mb-3">
        <input type="text" id="username" class="form-control" placeholder="Username">
    </div>

    <div class="mb-3">
        <input type="password" id="password" class="form-control" placeholder="Password">
    </div>

    <div class="mb-3">
        <input type="text" id="fullName" class="form-control" placeholder="Full Name">
    </div>

    <div class="mb-3">
        <input type="email" id="email" class="form-control" placeholder="Email">
    </div>

    <div class="d-grid">
        <button class="btn btn-custom" onclick="registerAdmin()">Register Admin</button>
    </div>

</div>

<script src="/js/register-admin.js"></script>
<script src="/js/toast.js"></script>

</body>
</html>
