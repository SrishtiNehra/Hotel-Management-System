<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0b1d3a, #1a2b4c);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .role-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 380px;
            text-align: center;
        }

        .role-title {
            font-weight: 700;
            color: #0b1d3a;
            margin-bottom: 25px;
        }

        .form-select {
            border-radius: 10px;
            border: 1px solid #0b1d3a;
            padding: 12px;
        }

        .form-select:focus {
            border-color: #0b1d3a;
            box-shadow: 0 0 0 0.2rem rgba(11, 29, 58, 0.25);
        }

        .hint {
            font-size: 13px;
            color: #5a6b7d;
            margin-top: 12px;
        }

        .icon {
            font-size: 40px;
            color: #0b1d3a;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="role-card">

    <div class="icon">🏨</div>

    <h2 class="role-title">Select Role to Register</h2>

    <select id="roleSelect" class="form-select form-select-lg"
            onchange="goToRegister(this.value)">

        <option value="">Select Role</option>
        <option value="ADMIN">Admin</option>
        <option value="CUSTOMER">Customer</option>

    </select>

    <div class="hint">
        Choose your role to continue registration
    </div>

</div>

<script>
function goToRegister(role) {

    if (!role) return;

    if (role === "ADMIN") {
        window.location.href = "/auth/register/admin";
    } 
    else if (role === "CUSTOMER") {
        window.location.href = "/auth/register/customer";
    }
}
</script>

</body>
</html>
